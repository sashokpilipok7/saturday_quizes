<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <!-- СТАРТОВИЙ ЕКРАН -->
      <section id="start-screen" class="screen">
        <h1>quiz</h1>
        <p>Робив Школьний Кіріл</p>

        <button id="start-btn" class="main-btn">click to start</button>
      </section>

      <!-- ЕКРАН ВІКТОРИНИ -->
      <section id="quiz-screen" class="screen hide">
        <div class="quiz-header">
          <h2>Питання</h2>

          <p>Рахунок: <span id="score-display">0</span></p>

          <p id="timer-display">Час: 15</p>
        </div>

        <h3 id="question-text">Текст питання</h3>

        <div id="answer-buttons" class="answers">
          <!-- Відповіді створюються через JavaScript -->
        </div>
      </section>

      <!-- ЕКРАН РЕЗУЛЬТАТУ -->
      <section id="result-screen" class="screen hide">
        <h2>Гру завершено!</h2>

        <p>Твій результат:</p>

        <h3 id="final-score">0 / 0</h3>

        <button id="restart-btn" class="main-btn">Спробувати ще раз</button>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
