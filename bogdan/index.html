<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
<div id="start-screen" class="screen">
    <h1>Вітаємо у Квізі!</h1>
    <button id="start-btn">Почати</button>
</div>

<div id="quiz-screen" class="screen hide">
    <div class="header">
        <span id="timer">Час: 15</span>
        <span id="score-display">Бали: 0</span>
    </div>
    <h2 id="question-text">Запитання </h2>
 <div id="answers-container"></div>
</div>

<div id="result-screen" class="screen hide">
    <h2>Квіз завершено!</h2>
    <p id="result-text"></p>
    <button id="restart-btn">Спробувати ще</button>
</div>

    <script src="script.js"></script>
</body>
</html>
