<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
   <div class="quiz-container">
        <div id="start-screen" class="screen">
            <h1>Welcome to the Quiz!</h1>
            <p>Готовий перевірити свої знання по HTML, CSS та JS? На кожне питання є 15 секунд.</p>
            <button id="start-btn">Почати</button>
        </div>
        <div id="quiz-screen" class="screen hide">
            <div class="header">
                <span id="timer">Час: 15</span>
                <span id="score-display">Бали: 0</span>
            </div>
            <h2 id="question-text">Запитання</h2>
            <div id="answers-container"></div>
        </div>
        <div id="result-screen" class="screen hide">
            <h2>Квіз завершено!</h2>
            <p id="result-text">Твій результат: 0 з 0 (0%)</p>
            <button id="restart-btn">Спробувати ще</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
